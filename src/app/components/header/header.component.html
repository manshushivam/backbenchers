<header class="header glass">
  <div class="logo-container" routerLink="/">
    <span class="material-symbols-outlined logo-icon gradient-text">school</span>
    <h2 class="logo-text gradient-text">Backbenchers</h2>
  </div>

  <nav class="nav-links">
    <a routerLink="/courses" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-outlined">video_library</span>
      Courses
    </a>
    <a routerLink="/explore" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-outlined">explore</span>
      Explore
    </a>
    <a routerLink="/leaderboard" routerLinkActive="active" class="nav-item">
      <span class="material-symbols-outlined">social_leaderboard</span>
      Ranks
    </a>
  </nav>

  <div class="auth-buttons">
    <button class="icon-btn theme-toggle" (click)="toggleTheme()" aria-label="Toggle Theme">
      <span class="material-symbols-outlined">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
    </button>

    <!-- Logged Out State -->
    <ng-container *ngIf="!authService.isLoggedIn && !authService.isLoading">
      <button class="btn-signup primary-btn" (click)="login()">
        <span class="material-symbols-outlined" style="font-size: 1.1rem; vertical-align: middle;">login</span>
        Sign in with Google
      </button>
    </ng-container>

    <!-- Logged In State -->
    <ng-container *ngIf="authService.isLoggedIn">
      <div class="user-profile">
        <img *ngIf="authService.userPhotoURL" [src]="authService.userPhotoURL" class="user-avatar" alt="Avatar" referrerpolicy="no-referrer">
        <span class="user-name">{{ authService.userDisplayName }}</span>
        <button class="icon-btn" (click)="logout()" title="Sign Out">
          <span class="material-symbols-outlined">logout</span>
        </button>
      </div>
    </ng-container>
  </div>
</header>
